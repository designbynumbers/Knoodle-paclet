name: windows-build

# Proves the three Knoodle CLI tools compile, link, and run natively on Windows
# with clang (never MSVC — the build needs clang's -fenable-matrix). This is the
# make-or-break CI job for the Windows paclet; macOS/Linux legs come later.

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - ".github/workflows/windows-build.yml"
      - "ci/**"
      - ".gitmodules"
      - "Knoodle"

jobs:
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash          # Git Bash, so one build script serves every OS leg
    steps:
      - name: Checkout paclet
        uses: actions/checkout@v4

      - name: Fetch Knoodle + nested submodules (ssh->https, skip LFS data)
        env:
          GIT_LFS_SKIP_SMUDGE: "1"     # KLUT data isn't needed to *build* the tools
        run: |
          # Knoodle's .gitmodules pin Tensors/Tools/MCF over SSH; rewrite to HTTPS
          # so the unauthenticated public clone works on the runner.
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule update --init --recursive
          echo "--- Knoodle pin ---"
          git -C Knoodle rev-parse HEAD
          echo "--- submodule tree ---"
          git submodule status --recursive | sed 's/^/  /'

      - name: Set up clang (LLVM)
        run: |
          if command -v clang++ >/dev/null 2>&1; then
            echo "clang++ already on PATH"
          elif [ -x "/c/Program Files/LLVM/bin/clang++.exe" ]; then
            echo "/c/Program Files/LLVM/bin" >> "$GITHUB_PATH"
          else
            echo "installing LLVM via choco"
            choco install llvm -y
            echo "/c/Program Files/LLVM/bin" >> "$GITHUB_PATH"
          fi

      - name: clang version
        run: clang++ --version

      - name: Build the three tools
        env:
          OPT: "-O2"
        run: bash ci/build-tools.sh

      - name: Smoke test (each binary executes on Windows)
        run: |
          for t in knoodlesimplify knoodledraw knoodleidentify; do
            echo "=== $t --help ==="
            "./build/$t.exe" --help || true
          done

      - name: Upload Windows binaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: knoodle-tools-windows-x86_64
          path: build/*.exe
          if-no-files-found: warn
